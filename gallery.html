<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Alvergel Frias</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <header class="scrolled">
        <div class="logo">Frias.</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="gallery-page">
            <div class="section-header reveal active">
                <span class="section-subtitle">The Collection</span>
                <h2 class="section-title">Works on Display.</h2>
            </div>

            <div class="gallery-filters reveal active">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="oil">Oil on Canvas</button>
                <button class="filter-btn" data-filter="mixed">Mixed Media</button>
                <button class="filter-btn" data-filter="sculpture">Sculptural</button>
            </div>

            <div class="featured-grid masonry">
                <div class="artwork-card reveal" data-category="mixed">
                    <img src="/assets/artwork1.png" alt="Bistay Series I" class="artwork-img">
                    <div class="artwork-info">
                        <h3 class="artwork-title">Bistay Series I</h3>
                        <p class="artwork-meta">Oil, Nylon, Mesh • 2024</p>
                    </div>
                </div>
                <div class="artwork-card reveal" data-category="mixed">
                    <img src="/assets/artwork2.png" alt="Beneath" class="artwork-img">
                    <div class="artwork-info">
                        <h3 class="artwork-title">Beneath</h3>
                        <p class="artwork-meta">Oil and Carved Wood • 2023</p>
                    </div>
                </div>
                <!-- These will be generated/available shortly -->
                <div class="artwork-card reveal" data-category="oil">
                    <img src="/assets/artwork3.png" alt="The Gaze" class="artwork-img">
                    <div class="artwork-info">
                        <h3 class="artwork-title">The Gaze</h3>
                        <p class="artwork-meta">Oil on Canvas • 2024</p>
                    </div>
                </div>
                <div class="artwork-card reveal" data-category="sculpture">
                    <img src="/assets/artwork4.png" alt="Industrial Anatomy" class="artwork-img">
                    <div class="artwork-info">
                        <h3 class="artwork-title">Industrial Anatomy</h3>
                        <p class="artwork-meta">Mixed Media & Metal • 2024</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Simple Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="lightbox-caption"></div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Alvergel Frias. All rights reserved.</p>
        </div>
    </footer>

    <style>
        .gallery-page {
            padding-top: 12rem;
        }

        .gallery-filters {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--muted-color);
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid transparent;
        }

        .filter-btn.active {
            color: var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
        }

        .masonry {
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox-content {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border: 1px solid var(--glass-border);
        }

        .close-lightbox {
            position: absolute;
            top: 2rem;
            right: 4rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        #lightbox-caption {
            margin-top: 2rem;
            font-family: var(--font-serif);
            font-size: 1.5rem;
        }
    </style>

    <script src="/main.js"></script>
    <script>
        // Gallery filtering and Lightbox
        const filterBtns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.artwork-card');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const closeBtn = document.querySelector('.close-lightbox');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.getAttribute('data-filter');

                cards.forEach(card => {
                    if (filter === 'all' || card.getAttribute('data-category') === filter) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const img = card.querySelector('img');
                const title = card.querySelector('.artwork-title').innerText;
                lightboxImg.src = img.src;
                lightboxCaption.innerText = title;
                lightbox.style.display = 'flex';
            });
        });

        closeBtn.onclick = () => lightbox.style.display = 'none';
        lightbox.onclick = (e) => {
            if (e.target === lightbox) lightbox.style.display = 'none';
        };
    </script>
</body>

</html>
